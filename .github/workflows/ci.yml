name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: arc-observation-js
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Run tests with coverage
        # Gate on the deterministic, mocked integration suite. The e2e suite
        # hits the live third-party API and is run separately (non-blocking)
        # so transient network/timeouts don't block merges and releases.
        run: bun test tests/integration/ --coverage --coverage-reporter="lcov"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Run e2e tests (non-blocking, live API)
        continue-on-error: true
        run: bun run test:e2e

  release:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: arc-observation-js
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Release
        run: bunx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
